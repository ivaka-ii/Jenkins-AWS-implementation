# ---------------------------------------------------------------------------
# GitLab CI/CD — Jenkins ECS/Fargate Platform
# ---------------------------------------------------------------------------
# AWS credentials can be provided in two ways:
#   1. CI/CD Variables (Settings > CI/CD > Variables) — for automatic runs
#   2. Pipeline input parameters — when running pipeline manually
# ---------------------------------------------------------------------------

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

stages:
  - validate
  - build-agent
  - plan
  - apply
  - test
  - secret-detection

variables:
  AWS_DEFAULT_REGION:
    value: "eu-central-1"
    description: "AWS region to deploy to"
  AWS_ACCESS_KEY_ID:
    description: "AWS Access Key ID"
  AWS_SECRET_ACCESS_KEY:
    description: "AWS Secret Access Key"
  AWS_ACCOUNT_ID:
    value: "038340334660"
    description: "AWS Account ID"
  PROJECT_NAME:
    value: "jenkins-ecs"
    description: "Project name prefix for all resources"
  TF_IN_AUTOMATION: "true"

# ---------------------------------------------------------------------------
# Reusable hidden jobs
# ---------------------------------------------------------------------------
.terraform_base:
  image:
    name: hashicorp/terraform:1.9
    entrypoint: [""]
  before_script:
    - export AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION}
    - |
      if [ -z "$AWS_ACCESS_KEY_ID" ] || [ -z "$AWS_SECRET_ACCESS_KEY" ]; then
        echo "ERROR: AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY must be set."
        echo "Set them in CI/CD Variables or provide them when running the pipeline manually."
        exit 1
      fi
    - export AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY
    - terraform version

.tf_init: &tf_init
  - terraform init
      -backend-config="bucket=${PROJECT_NAME}-terraform-state"
      -backend-config="region=${AWS_DEFAULT_REGION}"
      -backend-config="dynamodb_table=${PROJECT_NAME}-terraform-locks"
      -backend-config="encrypt=true"
      -reconfigure

# ---------------------------------------------------------------------------
# Stage: validate — lint & validate all layers
# ---------------------------------------------------------------------------
validate:terraform:
  stage: validate
  extends: .terraform_base
  script:
    - |
      for layer in 00-bootstrap 01-jenkins-platform 02-agents 03-app-infra; do
        echo "=== Validating terraform/${layer} ==="
        cd ${CI_PROJECT_DIR}/terraform/${layer}
        terraform init -backend=false
        terraform validate
        terraform fmt -check -diff
      done

# ---------------------------------------------------------------------------
# Stage: build-agent — build & push Docker agent image to ECR
# ---------------------------------------------------------------------------
build:agent-image:
  stage: build-agent
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
    ECR_REPO: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_DEFAULT_REGION}.amazonaws.com/${PROJECT_NAME}/jenkins-agent
  before_script:
    - apk add --no-cache aws-cli
    - aws ecr get-login-password --region ${AWS_DEFAULT_REGION}
        | docker login --username AWS --password-stdin
          ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_DEFAULT_REGION}.amazonaws.com
  script:
    - docker build -t ${ECR_REPO}:${CI_COMMIT_SHORT_SHA} -t ${ECR_REPO}:latest docker/jenkins-agent/
    - docker push ${ECR_REPO}:${CI_COMMIT_SHORT_SHA}
    - docker push ${ECR_REPO}:latest
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes:
        - docker/jenkins-agent/**/*# ---------------------------------------------------------------------------
# Stage: plan — Terraform plan per layer (merge requests & main)
# ---------------------------------------------------------------------------
plan:bootstrap:
  stage: plan
  extends: .terraform_base
  script:
    - cd terraform/00-bootstrap
    - *tf_init
    - terraform plan -out=tfplan
  artifacts:
    paths: [terraform/00-bootstrap/tfplan]
    expire_in: 1 hour

plan:jenkins-platform:
  stage: plan
  extends: .terraform_base
  script:
    - cd terraform/01-jenkins-platform
    - *tf_init
    - terraform plan -out=tfplan
  artifacts:
    paths: [terraform/01-jenkins-platform/tfplan]
    expire_in: 1 hour

plan:agents:
  stage: plan
  extends: .terraform_base
  script:
    - cd terraform/02-agents
    - *tf_init
    - terraform plan -out=tfplan
  artifacts:
    paths: [terraform/02-agents/tfplan]
    expire_in: 1 hour

plan:app-infra:
  stage: plan
  extends: .terraform_base
  variables:
    ENVIRONMENT: dev
  script:
    - cd terraform/03-app-infra
    - terraform init
        -backend-config="envs/${ENVIRONMENT}.backend.hcl"
        -reconfigure
    - terraform plan -var="aws_region=${AWS_DEFAULT_REGION}" -out=tfplan
  artifacts:
    paths: [terraform/03-app-infra/tfplan]
    expire_in: 1 hour

# ---------------------------------------------------------------------------
# Stage: apply — deploy on main branch only (manual trigger)
# ---------------------------------------------------------------------------
apply:bootstrap:
  stage: apply
  extends: .terraform_base
  needs:
    - job: plan:bootstrap
      artifacts: true
  script:
    - cd terraform/00-bootstrap
    - *tf_init
    - terraform apply -auto-approve tfplan
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual
  environment:
    name: bootstrap

apply:jenkins-platform:
  stage: apply
  extends: .terraform_base
  needs:
    - job: plan:jenkins-platform
      artifacts: true
    - job: apply:bootstrap
      optional: true
  script:
    - cd terraform/01-jenkins-platform
    - *tf_init
    - terraform apply -auto-approve tfplan
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual
  environment:
    name: jenkins-platform

apply:agents:
  stage: apply
  extends: .terraform_base
  needs:
    - job: plan:agents
      artifacts: true
    - job: apply:jenkins-platform
      optional: true
  script:
    - cd terraform/02-agents
    - *tf_init
    - terraform apply -auto-approve tfplan
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual
  environment:
    name: agents

apply:app-infra:
  stage: apply
  extends: .terraform_base
  needs:
    - job: plan:app-infra
      artifacts: true
    - job: apply:agents
      optional: true
  variables:
    ENVIRONMENT: dev
  script:
    - cd terraform/03-app-infra
    - terraform init
        -backend-config="envs/${ENVIRONMENT}.backend.hcl"
        -reconfigure
    - terraform apply -auto-approve tfplan
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual
  environment:
    name: app-infra/$ENVIRONMENT

# ---------------------------------------------------------------------------
# Security scanning (GitLab built-in templates)
# ---------------------------------------------------------------------------
include:
  - template: Security/SAST.gitlab-ci.yml
  - template: Security/Secret-Detection.gitlab-ci.yml
